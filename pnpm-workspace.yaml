$schema: 'https://raw.githubusercontent.com/SchemaStore/schemastore/refs/heads/master/src/schemas/json/pnpm-workspace.json'
packages:
    - apps/*
    - e2e/*
    - libs/*
    - packages/*

catalogs:
    angular:
        '@angular/build': '~22.0.5'
        '@angular/cli': '~22.0.5'
        '@angular/common': '~22.0.5'
        '@angular/compiler': '~22.0.5'
        '@angular/compiler-cli': '~22.0.5'
        '@angular/forms': '~22.0.5'
        '@angular/platform-browser': '~22.0.5'
        '@angular/router': '~22.0.5'
        'angular-eslint': '~22.0.0'
        'typescript': '~6.0.3'
    tooling:
        '@commitlint/cli': '~21.2.0'
        '@commitlint/config-conventional': '~21.2.0'
        '@eslint/js': '~10.0.1'
        '@moonrepo/cli': '~2.3.5'
        '@types/node': '~24.13.2'
        'eslint': '~10.6.0'
        'eslint-config-prettier': '~10.1.8'
        'husky': '~9.1.7'
        'jiti': '~2.7.0'
        'lint-staged': '~17.0.8'
        'markdownlint-cli2': '~0.23.0'
        'prettier': '~3.9.4'
        'prettier-plugin-organize-imports': '~4.3.0'
        'prettier-plugin-tailwindcss': '~0.8.0'
        'stylelint': '~17.14.0'
        'stylelint-config-clean-order': '~10.0.0'
        'stylelint-config-standard-scss': '~17.0.0'
        'stylelint-order': '~8.1.1'
        'typescript': '~6.0.3'
        'typescript-eslint': '~8.62.1'

savePrefix: '~'

minimumReleaseAge: 4320
trustPolicy: no-downgrade
trustPolicyExclude:
    - 'chokidar@4.0.3 || 5.0.0'
    - 'semver@6.3.1 || 7.7.4 || 7.8.5'
engineStrict: true
allowBuilds:
    '@parcel/watcher@2.5.6': true
    'esbuild@0.27.7 || 0.28.1': true
    'lmdb@3.5.4': true
    'msgpackr-extract@3.0.4': true
