# yaml-language-server: $schema=../../.moon/cache/schemas/project.json

layer: 'application'
stack: 'frontend'

project:
    title: 'Web'
    description: "Main Angular web client — the primary Craftsman's Ledger UI."

tasks:
    start:
        command: 'ng serve'
        toolchains: ['node']
        preset: 'server'

    build:
        command: 'ng build'
        toolchains: ['node']
        inputs:
            - '/angular.json'
            - 'src/**/*'
            - 'public/**/*'
            - 'tsconfig*.json'
        outputs:
            - 'dist'

    lint-ts:
        command: 'eslint .'
        toolchains: ['node']
        inputs:
            - 'src/**/*'
            - 'eslint.config.mts'
            - 'tsconfig*.json'

    lint-css:
        command: 'stylelint "src/**/*.scss"'
        toolchains: ['node']
        inputs:
            - 'src/**/*.scss'
            - '.stylelintrc.json'
            - '/packages/stylelint-config/base.js'
            - '/packages/stylelint-config/angular.js'

    typecheck:
        script: 'tsc --noEmit -p tsconfig.app.json && tsc --noEmit -p tsconfig.spec.json && tsc --noEmit -p tsconfig.eslint.json'
        toolchains: ['node']
        inputs:
            - 'src/**/*'
            - 'eslint.config.mts'
            - 'tsconfig*.json'
