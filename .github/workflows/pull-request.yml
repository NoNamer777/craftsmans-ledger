name: Pull Request

on:
    pull_request:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    WEB_DOCKER_IMAGE: ghcr.io/nonamer777/craftsmans-ledger/web

jobs:
    ci:
        name: CI
        runs-on: ubuntu-24.04
        timeout-minutes: 5
        outputs:
            web-affected: ${{ steps.affected.outputs.affected }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Run CI
              uses: ./.github/actions/ci

            - name: Check whether web is affected
              id: affected
              uses: ./.github/actions/affected
              with:
                  project: web

            - name: Lint commit messages
              shell: bash
              run: pnpm commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

    docker-web:
        name: docker-web
        needs: ci
        if: needs.ci.outputs.web-affected == 'true'
        runs-on: ubuntu-24.04
        timeout-minutes: 10
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up QEMU
              uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

            - name: Docker setup
              uses: ./.github/actions/docker
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
              with:
                  images: ${{ env.WEB_DOCKER_IMAGE }}
                  tags: |
                      type=ref,event=pr

            - name: Build and push
              uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
              with:
                  source: .
                  files: |
                      ./apps/web/.docker/docker-bake.hcl
                      cwd://${{ steps.meta.outputs.bake-file }}
                  targets: build
                  push: true

    e2e-web:
        name: e2e-web
        needs: [ci, docker-web]
        if: needs.ci.outputs.web-affected == 'true'
        runs-on: ubuntu-24.04
        timeout-minutes: 5
        permissions:
            contents: read
            packages: read
        env:
            WEB_IMAGE_TAG: pr-${{ github.event.pull_request.number }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Docker setup
              uses: ./.github/actions/docker
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Start E2E environment
              run: docker compose -f apps/web/.docker/compose.yaml up -d

            - name: Smoke-test E2E environment
              run: curl --fail -k --retry 5 --retry-delay 1 --retry-all-errors https://localhost:8443/
