# yaml-language-server: $schema=./.moon/cache/schemas/project.json

layer: 'automation'
stack: 'unknown'

project:
    title: "Craftsman's Ledger"
    description: 'Workspace root — houses repo-wide maintenance and process tasks, not application code.'

tasks:
    format:
        command: 'prettier --write .'
        toolchains: ['node']
        inputs:
            - '**/*'
            - '!**/node_modules/**'
        options:
            cache: false
            runInCI: false

    format-check:
        command: 'prettier --check .'
        toolchains: ['node']
        inputs:
            - '**/*'
            - '!**/node_modules/**'

    lint-ts:
        command: 'eslint .'
        toolchains: ['node']
        inputs:
            - '*.js'
            - '*.mjs'
            - '*.cjs'
            - '*.ts'
            - 'eslint.config.mts'

    typecheck:
        command: 'tsc --noEmit -p tsconfig.json'
        toolchains: ['node']
        inputs:
            - '*.mts'
            - 'tsconfig.json'

    setup-https:
        command: 'mkcert'
        args:
            - '-cert-file'
            - '.certs/cert.pem'
            - '-key-file'
            - '.certs/key.pem'
            - 'localhost.www.craftsmans-ledger.dev'
            - 'localhost.api.craftsmans-ledger.dev'
            - 'localhost.admin.craftsmans-ledger.dev'
            - 'localhost'
            - '127.0.0.1'
        outputs:
            - '.certs/cert.pem'
            - '.certs/key.pem'
        options:
            runInCI: false
